<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Archipelago Overlay</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h2, h3 {
            margin-bottom: 10px;
        }

        .player {
            margin-bottom: 18px;
        }

        .bar-container {
            width: 100%;
            max-width: 400px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            margin-top: 20px;
            overflow: visible;
            margin-top: 5px;
            
        }

<!--        .bar-fill {
           height: 100%;
            background: rgb(219, 20, 20);
            width: 0%;
            transition: width 0.4s ease;
        }
//-->

        .divider {
            margin-top: 30px;
            border-top: 1px solid #555;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<h2>Archipelago Status</h2>
<button onclick="refreshData()" class="refresh-button">
  Refresh Status
</button>
<div class="divider"></div>
<h3>Global Progress</h3>
<div id="globalStats"></div>

<div class="divider"></div>
<h3>Recent Events</h3>
<div id="recentEvents">Waiting for events...</div>
</div>

<div class="divider"></div>
<div id="players">Loading...</div> 

<script>

async function updateOverlay() {
    try {
        const res = await fetch("http://localhost:5000/data");
        const data = await res.json();
        const playersDiv = document.getElementById("players");
        playersDiv.innerHTML = "";

        let globalDone = 0;
        let globalTotal = 0;

        const players = Object.entries(data.players || {});

        if (players.length === 0) {
            playersDiv.innerHTML = "Waiting for player data...";
            return;
        }

        players.sort((a, b) => b[1].percent - a[1].percent);

        players.forEach(([name, p]) => {
            globalDone += p.checks_done || 0;
            globalTotal += p.total_checks || 0;
            const percent = p.percent || 0;
            const connected = p.connected;
            const statusIcon = p.connected ? `<span class="status" style="color: green;padding-left: 6px;text-shadow: 0 0 6px green">🟢</span>` : `<span class="status" style="color: gray;padding-left: 6px;text-shadow: 0 0 6px gray">⚫</span>`;
            playersDiv.innerHTML += `
                <div class="player" style="padding-left: 6px; color: ${p.colour}; text-shadow: 0 0 6px ${p.colour}; margin-bottom: 6px;">
                    <span class="status">${statusIcon}</span>
                    <span class="player_name"><strong>${name}</strong></span>
                    <span>(${p.game})</span>
                    <span>${p.checks_done} / ${p.total_checks} — ${percent}%</span>
                    <div class="bar-container" style="margin-top: 20px;">
                    <div class="bar-fill" style="
                        width:${percent}%;
                        background:${p.colour};
                        border-radius: 10px;
                        height: 18px;
                    box-shadow: ${p.connected 
                        ? `inset 0 0 4px rgba(255,255,255,0.4), 0 0 6px ${p.colour}, 0 0 16px ${p.colour}` 
                        : `0 0 2px ${p.colour}`};
                    "></div>
                    </div>
                </div>
            `;
        const remaining = globalTotal - globalDone;
        const globalPercent = globalTotal > 0
            ? ((globalDone / globalTotal) * 100).toFixed(1)
            : 0;

        document.getElementById("globalStats").innerHTML = `
            Total Completed: ${globalDone} / ${globalTotal}<br>
            Total Remaining: ${remaining}<br>
            Overall Progress: ${globalPercent}%
        `;

        const recentDiv = document.getElementById("recentEvents");
            recentDiv.innerHTML = "";

            const recent = (data.recent_events || []).slice(-5).reverse();

            if (recent.length === 0) {
                recentDiv.innerHTML = "No recent events yet.";
            } else {
                recent.forEach(event => {
                    recentDiv.innerHTML += `
                        <div class="recent-check">
                            ${event}
                        </div>
                    `;
                });
            }
        });
    } catch (err) {
        document.getElementById("players").innerHTML =
            "Error fetching data. Is the Rogipelago Tracker running?";
    }
}

setInterval(updateOverlay, 15000);
updateOverlay();

</script>
<script>
function refreshData() {
    fetch("/refresh")
        .then(response => response.json())
        .then(data => {
            console.log("Manual refresh triggered");
        });
}
</script>
</body>
</html>
